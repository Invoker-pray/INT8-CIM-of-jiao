<svg width="1100" height="600" viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义滤镜和箭头 -->
  <defs>
    <!-- 柔和阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="4" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 向下箭头 -->
    <marker id="arrowDown" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L3,6 L6,0 z" fill="#555" />
    </marker>
    
    <!-- 统一字体 -->
    <style>
      text {
        font-family: 'Microsoft YaHei', 'Heiti SC', system-ui, sans-serif;
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="600" fill="#ffffff" />
  
  <!-- 主标题 -->
  <text x="550" y="50" font-size="32" font-weight="900" text-anchor="middle" fill="#333">
    本课题技术路线选型与依据
  </text>

  <!-- ================================================================================== -->
  <!-- 支柱 1：架构选型 (数字 SRAM-CIM) -->
  <!-- ================================================================================== -->
  <g transform="translate(60, 100)">
    <!-- 顶部：备选方案 (灰色) -->
    <g opacity="0.6">
        <rect x="0" y="0" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="27" font-size="16" text-anchor="middle" fill="#777">模拟 CIM (Analog)</text>
        <text x="140" y="55" font-size="14" text-anchor="middle" fill="#999">精度受限 / ADC开销大</text>
        
        <rect x="0" y="70" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="97" font-size="16" text-anchor="middle" fill="#777">传统加速器 (NPU)</text>
        <text x="140" y="125" font-size="14" text-anchor="middle" fill="#999">受限于内存墙</text>
    </g>

    <!-- 向下筛选箭头 -->
    <line x1="140" y1="135" x2="140" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowDown)" stroke-dasharray="5,5" />

    <!-- 底部：最终选择 (蓝色高亮) -->
    <g transform="translate(0, 180)">
        <rect x="0" y="0" width="280" height="280" fill="#e3f2fd" stroke="#1565c0" stroke-width="3" rx="15" filter="url(#shadow)" />
        
        <text x="140" y="40" font-size="22" font-weight="900" text-anchor="middle" fill="#0d47a1">数字 SRAM-CIM</text>
        <line x1="40" y1="55" x2="240" y2="55" stroke="#1565c0" stroke-width="2" />
        
        <!-- 核心依据 -->
        <g transform="translate(30, 80)">
            <circle cx="10" cy="10" r="5" fill="#1565c0" />
            <text x="25" y="16" font-size="16" font-weight="bold" fill="#333">无模拟外设 (ADC-less)</text>
            <text x="25" y="38" font-size="14" fill="#555">易于综合与集成</text>

            <circle cx="10" cy="70" r="5" fill="#1565c0" />
            <text x="25" y="76" font-size="16" font-weight="bold" fill="#333">工艺成熟度高</text>
            <text x="25" y="98" font-size="14" fill="#555">标准 CMOS 工艺</text>

            <circle cx="10" cy="130" r="5" fill="#1565c0" />
            <text x="25" y="136" font-size="16" font-weight="bold" fill="#333">精度可控</text>
            <text x="25" y="158" font-size="14" fill="#555">无噪声干扰风险</text>
        </g>
    </g>
  </g>

  <!-- ================================================================================== -->
  <!-- 支柱 2：数据格式 (Signed-INT8) -->
  <!-- ================================================================================== -->
  <g transform="translate(410, 100)">
    <!-- 顶部：备选方案 (灰色) -->
    <g opacity="0.6">
        <rect x="0" y="0" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="27" font-size="16" text-anchor="middle" fill="#777">浮点 (FP32/FP16)</text>
        <text x="140" y="55" font-size="14" text-anchor="middle" fill="#999">硬件开销过大</text>
        
        <rect x="0" y="70" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="97" font-size="16" text-anchor="middle" fill="#777">二值化 (BNN/INT1)</text>
        <text x="140" y="125" font-size="14" text-anchor="middle" fill="#999">精度损失严重</text>
    </g>

    <!-- 向下筛选箭头 -->
    <line x1="140" y1="135" x2="140" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowDown)" stroke-dasharray="5,5" />

    <!-- 底部：最终选择 (绿色高亮) -->
    <g transform="translate(0, 180)">
        <rect x="0" y="0" width="280" height="280" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" rx="15" filter="url(#shadow)" />
        
        <text x="140" y="40" font-size="22" font-weight="900" text-anchor="middle" fill="#1b5e20">Signed-INT8</text>
        <line x1="40" y1="55" x2="240" y2="55" stroke="#2e7d32" stroke-width="2" />
        
        <!-- 核心依据 -->
        <g transform="translate(30, 80)">
            <circle cx="10" cy="10" r="5" fill="#2e7d32" />
            <text x="25" y="16" font-size="16" font-weight="bold" fill="#333">精度/开销平衡</text>
            <text x="25" y="38" font-size="14" fill="#555">工业界推理标准</text>

            <circle cx="10" cy="70" r="5" fill="#2e7d32" />
            <text x="25" y="76" font-size="16" font-weight="bold" fill="#333">支持负数运算</text>
            <text x="25" y="98" font-size="14" fill="#555">适应权重/激活分布</text>

            <circle cx="10" cy="130" r="5" fill="#2e7d32" />
            <text x="25" y="136" font-size="16" font-weight="bold" fill="#333">量化生态成熟</text>
            <text x="25" y="158" font-size="14" fill="#555">易于软件模型对齐</text>
        </g>
    </g>
  </g>

  <!-- ================================================================================== -->
  <!-- 支柱 3：验证平台 (FPGA) -->
  <!-- ================================================================================== -->
  <g transform="translate(760, 100)">
    <!-- 顶部：备选方案 (灰色) -->
    <g opacity="0.6">
        <rect x="0" y="0" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="27" font-size="16" text-anchor="middle" fill="#777">纯软件仿真</text>
        <text x="140" y="55" font-size="14" text-anchor="middle" fill="#999">无法验证真实时序</text>
        
        <rect x="0" y="70" width="280" height="40" fill="#f5f5f5" stroke="#999" rx="5" />
        <text x="140" y="97" font-size="16" text-anchor="middle" fill="#777">ASIC 流片</text>
        <text x="140" y="125" font-size="14" text-anchor="middle" fill="#999">周期长 / 成本极高</text>
    </g>

    <!-- 向下筛选箭头 -->
    <line x1="140" y1="135" x2="140" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowDown)" stroke-dasharray="5,5" />

    <!-- 底部：最终选择 (橙色高亮) -->
    <g transform="translate(0, 180)">
        <rect x="0" y="0" width="280" height="280" fill="#fff3e0" stroke="#ef6c00" stroke-width="3" rx="15" filter="url(#shadow)" />
        
        <text x="140" y="40" font-size="22" font-weight="900" text-anchor="middle" fill="#e65100">FPGA 原型验证</text>
        <line x1="40" y1="55" x2="240" y2="55" stroke="#ef6c00" stroke-width="2" />
        
        <!-- 核心依据 -->
        <g transform="translate(30, 80)">
            <circle cx="10" cy="10" r="5" fill="#ef6c00" />
            <text x="25" y="16" font-size="16" font-weight="bold" fill="#333">快速迭代</text>
            <text x="25" y="38" font-size="14" fill="#555">可重构性强</text>

            <circle cx="10" cy="70" r="5" fill="#ef6c00" />
            <text x="25" y="76" font-size="16" font-weight="bold" fill="#333">真实硬件评估</text>
            <text x="25" y="98" font-size="14" fill="#555">准确的资源/功耗数据</text>

            <circle cx="10" cy="130" r="5" fill="#ef6c00" />
            <text x="25" y="136" font-size="16" font-weight="bold" fill="#333">低成本验证</text>
            <text x="25" y="158" font-size="14" fill="#555">适合硕士/本科课题</text>
        </g>
    </g>
  </g>

  <!-- ================================================================================== -->
  <!-- 底部汇总：目标 -->
  <!-- ================================================================================== -->
  <g transform="translate(250, 500)">
    <path d="M140,0 L300,50 L460,0" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" />
    
    <rect x="150" y="40" width="300" height="50" fill="#333" rx="25" filter="url(#shadow)" />
    <text x="300" y="72" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">
      目标：高能效边缘智能加速器
    </text>
  </g>

</svg>
