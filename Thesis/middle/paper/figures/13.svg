<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="600"
   height="450"
   viewBox="0 0 600 450"
   version="1.1"
   id="svg18"
   sodipodi:docname="13.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview18"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.7266667"
     inkscape:cx="300"
     inkscape:cy="225"
     inkscape:window-width="1920"
     inkscape:window-height="991"
     inkscape:window-x="-9"
     inkscape:window-y="-9"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg18" />
  <!-- 定义滤镜和渐变 -->
  <defs
     id="defs7">
    <!-- 柔和投影，增加立体感 -->
    <filter
       id="shadow"
       x="-0.050526316"
       y="-0.08"
       width="1.1010526"
       height="1.1933333">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="4"
         id="feGaussianBlur1" />
      <feOffset
         dx="0"
         dy="4"
         result="offsetblur"
         id="feOffset1" />
      <feComponentTransfer
         id="feComponentTransfer1">
        <feFuncA
           type="linear"
           slope="0.3"
           id="feFuncA1" />
      </feComponentTransfer>
      <feMerge
         id="feMerge2">
        <feMergeNode
           in="offsetblur"
           id="feMergeNode1" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode2" />
      </feMerge>
    </filter>
    <!-- 顶层渐变 (金色/橙色 - 最终成果) -->
    <linearGradient
       id="gradTop"
       x1="0"
       y1="0"
       x2="157.16234"
       y2="157.16234"
       gradientTransform="scale(1.208941,0.82717019)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#ffb74d;stop-opacity:1"
         id="stop2" />
      <stop
         offset="100%"
         style="stop-color:#f57c00;stop-opacity:1"
         id="stop3" />
    </linearGradient>
    <!-- 中层渐变 (深紫色 - 性能核心) -->
    <linearGradient
       id="gradMid"
       x1="0"
       y1="0"
       x2="198.99749"
       y2="198.99749"
       gradientTransform="scale(1.6583124,0.60302269)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#7986cb;stop-opacity:1"
         id="stop4" />
      <stop
         offset="100%"
         style="stop-color:#3f51b5;stop-opacity:1"
         id="stop5" />
    </linearGradient>
    <!-- 底层渐变 (蓝灰色 - 坚实基础) -->
    <linearGradient
       id="gradBot"
       x1="0"
       y1="0"
       x2="244.94897"
       y2="244.94897"
       gradientTransform="scale(2.0412415,0.48989795)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#90caf9;stop-opacity:1"
         id="stop6" />
      <stop
         offset="100%"
         style="stop-color:#1e88e5;stop-opacity:1"
         id="stop7" />
    </linearGradient>
    <!-- 统一字体 -->
    <style
       id="style7">
      text {
        font-family: 'Microsoft YaHei', 'Heiti SC', system-ui, sans-serif;
      }
      .title { font-size: 20px; font-weight: 900; fill: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
      .desc { font-size: 16px; font-weight: 500; fill: #fff; opacity: 0.95; }
      .label { font-size: 14px; font-weight: bold; fill: #555; }
    </style>
  </defs>
  <!-- 背景透明，方便贴在PPT白色背景上 -->
  <!-- ================================================================================== -->
  <!-- 金字塔主体 -->
  <!-- ================================================================================== -->
  <g
     transform="translate(31.467181,21.737452)"
     id="g16">
    <!-- 1. 底层 (Basic Metrics) -->
    <g
       transform="translate(0,280)"
       filter="url(#shadow)"
       id="g9">
      <!-- 梯形 -->
      <path
         d="M 0,120 H 500 L 420,0 H 80 Z"
         fill="url(#gradBot)"
         id="path7"
         style="fill:url(#gradBot)" />
      <!-- 文字 -->
      <text
         x="250"
         y="45"
         text-anchor="middle"
         class="title"
         id="text7">基础指标 (Basic)</text>
      <text
         x="250"
         y="75"
         text-anchor="middle"
         class="desc"
         id="text8">INT8 MAC 正确性 (Bit-exact)</text>
      <text
         x="250"
         y="98"
         text-anchor="middle"
         class="desc"
         id="text9">资源占用 (LUT / DSP / BRAM)</text>
    </g>
    <!-- 2. 中层 (Performance Metrics) -->
    <g
       transform="translate(85,150)"
       filter="url(#shadow)"
       id="g12">
      <!-- 梯形 -->
      <path
         d="M 0,120 H 330 L 265,0 H 65 Z"
         fill="url(#gradMid)"
         id="path9"
         style="fill:url(#gradMid)" />
      <!-- 文字 -->
      <text
         x="165"
         y="45"
         text-anchor="middle"
         class="title"
         id="text10">性能指标 (Performance)</text>
      <text
         x="165"
         y="75"
         text-anchor="middle"
         class="desc"
         id="text11">工作频率 (Fmax)</text>
      <text
         x="165"
         y="98"
         text-anchor="middle"
         class="desc"
         id="text12">峰值吞吐 (GOPS) / 能效比</text>
    </g>
    <!-- 3. 顶层 (End-to-End Goal) -->
    <g
       transform="translate(155,10)"
       filter="url(#shadow)"
       id="g15">
      <!-- 三角形 -->
      <path
         d="M 0,130 H 190 L 95,0 Z"
         fill="url(#gradTop)"
         id="path12"
         style="fill:url(#gradTop)" />
      <!-- 文字 -->
      <text
         x="95"
         y="65"
         text-anchor="middle"
         class="title"
         id="text13">端到端正确性</text>
      <text
         x="95"
         y="90"
         text-anchor="middle"
         class="desc"
         id="text14">YOLO / SSD</text>
      <text
         x="95"
         y="110"
         text-anchor="middle"
         class="desc"
         id="text15">Demo 部署</text>
    </g>
  </g>
  <!-- ================================================================================== -->
  <!-- 右侧标注：层级关系 -->
  <!-- ================================================================================== -->
  <g
     transform="translate(502.62548,14.092664)"
     id="g18">
    <!-- 向上箭头 -->
    <line
       x1="30"
       y1="380"
       x2="30"
       y2="50"
       stroke="#cccccc"
       stroke-width="2"
       stroke-dasharray="5, 5"
       marker-end="url(#arrow)"
       id="line16" />
    <path
       d="M 30,50 25,60 H 35 Z"
       fill="#cccccc"
       id="path16" />
    <!-- 手绘箭头头 -->
    <!-- 标注文字 -->
    <text
       x="40"
       y="100"
       class="label"
       fill="#f57c00"
       id="text16">应用层</text>
    <text
       x="40"
       y="240"
       class="label"
       fill="#3f51b5"
       id="text17">性能层</text>
    <text
       x="40"
       y="360"
       class="label"
       fill="#1e88e5"
       id="text18">实现层</text>
  </g>
</svg>
