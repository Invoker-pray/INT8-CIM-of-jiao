<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="500"
   viewBox="0 0 800 500"
   version="1.1"
   id="svg26"
   sodipodi:docname="1.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview26"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.554"
     inkscape:cx="400.2574"
     inkscape:cy="250"
     inkscape:window-width="1920"
     inkscape:window-height="991"
     inkscape:window-x="-9"
     inkscape:window-y="-9"
     inkscape:window-maximized="1"
     inkscape:current-layer="g21" />
  <!-- 定义渐变和滤镜 -->
  <defs
     id="defs5">
    <!-- 左侧处理器背景渐变 -->
    <linearGradient
       id="cpuGradient"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#e3f2fd;stop-opacity:1"
         id="stop1" />
      <stop
         offset="100%"
         style="stop-color:#bbdefb;stop-opacity:1"
         id="stop2" />
    </linearGradient>
    <!-- 右侧存储器背景渐变 -->
    <linearGradient
       id="memGradient"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#e8f5e9;stop-opacity:1"
         id="stop3" />
      <stop
         offset="100%"
         style="stop-color:#c8e6c9;stop-opacity:1"
         id="stop4" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter
       id="shadow"
       x="-0.037272727"
       y="-0.027333333"
       width="1.0836364"
       height="1.0613333">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="3"
         id="feGaussianBlur4" />
      <feOffset
         dx="2"
         dy="2"
         result="offsetblur"
         id="feOffset4" />
      <feComponentTransfer
         id="feComponentTransfer4">
        <feFuncA
           type="linear"
           slope="0.3"
           id="feFuncA4" />
      </feComponentTransfer>
      <feMerge
         id="feMerge5">
        <feMergeNode
           in="offsetblur"
           id="feMergeNode4" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode5" />
      </feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect
     width="800"
     height="500"
     fill="#ffffff"
     id="rect5" />
  <!-- 标题 -->
  <text
     x="400"
     y="40"
     font-family="'Microsoft YaHei', sans-serif"
     font-size="24"
     font-weight="bold"
     text-anchor="middle"
     fill="#333"
     id="text5">
    图1：冯·诺依曼架构下的内存墙与能耗瓶颈示意图
  </text>
  <!-- 左侧：计算核心 (Logic/Processing Unit) -->
  <g
     transform="translate(50, 100)"
     id="g11">
    <!-- 外框 -->
    <rect
       x="0"
       y="0"
       width="220"
       height="300"
       rx="15"
       ry="15"
       fill="url(#cpuGradient)"
       stroke="#1565c0"
       stroke-width="2"
       filter="url(#shadow)"
       id="rect6" />
    <text
       x="110"
       y="40"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="20"
       font-weight="bold"
       text-anchor="middle"
       fill="#0d47a1"
       id="text6">
      处理器 (CPU/GPU)
    </text>
    <!-- 内部：MAC运算示意 (修改点：蓝色填充，实线，字体统一) -->
    <rect
       x="35"
       y="70"
       width="150"
       height="100"
       fill="#90caf9"
       stroke="#0d47a1"
       stroke-width="2"
       rx="5"
       id="rect7" />
    <!-- 文字加大，字体统一 -->
    <text
       x="110"
       y="110"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="20"
       font-weight="bold"
       text-anchor="middle"
       fill="#0d47a1"
       id="text7">MAC Units</text>
    <text
       x="110"
       y="140"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       text-anchor="middle"
       fill="#1565c0"
       id="text8">YOLO/SSD Infer</text>
    <!-- 计算能耗低 -->
    <g
       transform="translate(60, 200)"
       id="g10">
      <path
         d="M20,0 L20,40"
         stroke="#2962ff"
         stroke-width="3"
         marker-end="url(#arrowBlue)"
         id="path8" />
      <text
         x="51.240639"
         y="26.537729"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="16.211px"
         fill="#2962ff"
         id="text9"
         transform="scale(0.97523617,1.0253927)"
         style="stroke-width:1.15793">计算能耗低</text>
      <text
         x="50"
         y="45"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="12"
         fill="#555"
         id="text10">(pJ/Op)</text>
    </g>
  </g>
  <!-- 右侧：存储器 (DRAM) -->
  <g
     transform="translate(530, 100)"
     id="g15">
    <!-- 外框 -->
    <rect
       x="0"
       y="0"
       width="220"
       height="300"
       rx="15"
       ry="15"
       fill="url(#memGradient)"
       stroke="#2e7d32"
       stroke-width="2"
       filter="url(#shadow)"
       id="rect11" />
    <text
       x="110"
       y="40"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="20"
       font-weight="bold"
       text-anchor="middle"
       fill="#1b5e20"
       id="text11">
      片外存储 (DRAM)
    </text>
    <!-- 内部数据堆叠 (文字加大) -->
    <rect
       x="35"
       y="70"
       width="150"
       height="35"
       fill="#a5d6a7"
       stroke="#1b5e20"
       stroke-width="1.5"
       rx="3"
       id="rect12" />
    <text
       x="110"
       y="94"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       font-weight="bold"
       text-anchor="middle"
       fill="#1b5e20"
       id="text12">Weights (权重)</text>
    <rect
       x="35"
       y="115"
       width="150"
       height="35"
       fill="#a5d6a7"
       stroke="#1b5e20"
       stroke-width="1.5"
       rx="3"
       id="rect13" />
    <text
       x="110"
       y="139"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       font-weight="bold"
       text-anchor="middle"
       fill="#1b5e20"
       id="text13">Feature Maps</text>
    <rect
       x="35"
       y="160"
       width="150"
       height="35"
       fill="#a5d6a7"
       stroke="#1b5e20"
       stroke-width="1.5"
       rx="3"
       id="rect14" />
    <text
       x="110"
       y="184"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       font-weight="bold"
       text-anchor="middle"
       fill="#1b5e20"
       id="text14">Input Images</text>
    <!-- 存储容量大 -->
    <text
       x="111.41171"
       y="236.17998"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="18.2823px"
       text-anchor="middle"
       fill="#2e7d32"
       id="text15"
       transform="scale(0.9815872,1.0187582)"
       style="stroke-width:1.14265">海量数据</text>
  </g>
  <!-- 中间：总线瓶颈与能耗 (The Bottleneck) -->
  <g
     transform="translate(270, 130)"
     id="g21">
    <!-- 双向箭头表示总线，中间收窄 -->
    <path
       d="M0,40 L80,60 L180,60 L260,40 L260,100 L180,80 L80,80 L0,100 Z"
       fill="#ffe0b2"
       stroke="#f57c00"
       stroke-width="2"
       id="path15" />
    <!-- 拥堵的数据包 -->
    <rect
       x="88.712997"
       y="62"
       width="15"
       height="16"
       fill="#ef6c00"
       stroke="#ffffff"
       id="rect15">
      <animate
         attributeName="x"
         values="90;160;90"
         dur="3s"
         repeatCount="indefinite" />
    </rect>
    <rect
       x="120.93951"
       y="62"
       width="15"
       height="16"
       fill="#ef6c00"
       stroke="#ffffff"
       id="rect16">
      <animate
         attributeName="x"
         values="110;140;110"
         dur="2.5s"
         repeatCount="indefinite" />
    </rect>
    <rect
       x="155.74002"
       y="62.643501"
       width="15"
       height="16"
       fill="#ef6c00"
       stroke="#ffffff"
       id="rect17">
      <animate
         attributeName="x"
         values="130;100;130"
         dur="3.5s"
         repeatCount="indefinite" />
    </rect>
    <!-- 瓶颈标识 -->
    <text
       x="130"
       y="30"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       font-weight="bold"
       text-anchor="middle"
       fill="#d84315"
       id="text17">
      数据总线 (Bus)
    </text>
    <!-- 红色大箭头：高能耗 -->
    <g
       transform="translate(80, 120)"
       id="g20">
      <path
         d="M50,0 L50,60"
         stroke="#d32f2f"
         stroke-width="8"
         marker-end="url(#arrowRed)"
         id="path17" />
      <text
         x="50"
         y="85"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="16"
         font-weight="bold"
         text-anchor="middle"
         fill="#c62828"
         id="text18">
          搬运能耗极高
        </text>
      <text
         x="50"
         y="105"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="14"
         text-anchor="middle"
         fill="#555"
         id="text19">
          (nJ/Access)
        </text>
      <text
         x="115.63706"
         y="124.3565"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="12px"
         text-anchor="middle"
         fill="#777777"
         id="text20">~100x vs 计算</text>
    </g>
  </g>
  <!-- 底部：内存墙图示 -->
  <g
     transform="translate(98.712999,424.5045)"
     id="g24">
    <!-- 墙体 -->
    <rect
       x="300"
       y="-50"
       width="10"
       height="100"
       fill="#546e7a"
       id="rect21" />
    <!-- 左侧：处理器速度曲线 -->
    <path
       d="m 50,30 q 100,0 230,-70"
       fill="none"
       stroke="#1976d2"
       stroke-width="3"
       marker-end="url(#arrowBlue)"
       id="path21" />
    <text
       x="181.53152"
       y="-36.731018"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="14px"
       fill="#1976d2"
       font-weight="bold"
       id="text21">处理器性能</text>
    <!-- 右侧：存储速度曲线 -->
    <path
       d="M 50,30 Q 150,30 280,10"
       fill="none"
       stroke="#388e3c"
       stroke-width="3"
       marker-end="url(#arrowGreen)"
       id="path22" />
    <text
       x="149.35651"
       y="40.592022"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="14px"
       fill="#388e3c"
       font-weight="bold"
       id="text22">存储带宽/延迟</text>
    <!-- 墙的标签 -->
    <text
       x="320"
       y="0"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="18px"
       font-weight="bold"
       fill="#37474f"
       id="text23">Memory Wall</text>
    <text
       x="320"
       y="25"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="14px"
       fill="#555555"
       id="text24">限制系统吞吐与实时性</text>
  </g>
  <!-- 箭头定义 -->
  <defs
     id="defs26">
    <marker
       id="arrowBlue"
       markerWidth="10"
       markerHeight="10"
       refX="9"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L0,6 L9,3 z"
         fill="#1976d2"
         id="path24" />
    </marker>
    <marker
       id="arrowGreen"
       markerWidth="10"
       markerHeight="10"
       refX="9"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L0,6 L9,3 z"
         fill="#388e3c"
         id="path25" />
    </marker>
    <marker
       id="arrowRed"
       markerWidth="10"
       markerHeight="10"
       refX="9"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L0,6 L9,3 z"
         fill="#d32f2f"
         id="path26" />
    </marker>
  </defs>
</svg>
