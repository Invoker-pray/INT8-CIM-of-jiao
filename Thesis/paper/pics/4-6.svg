  <title id="title1">LeNet-5 End-to-End Latency Breakdown Donut Chart</title>
  <desc id="desc1">Donut chart showing latency breakdown for LeNet-5 inference on 200 MNIST images at 100 MHz. MVM ping-pong wall time dominates at 87.5% (26.36 ms). Total: 30.13 ms/image at 33.2 fps.</desc>
