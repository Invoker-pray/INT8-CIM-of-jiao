  <title
     id="title1">LeNet-5 End-to-End Latency Breakdown Donut Chart</title>
  <desc
     id="desc1">Donut chart showing latency breakdown for LeNet-5 inference on 200 MNIST images at 64 MHz. MVM ping-pong wall time dominates at 87.0% (26.0 ms). Total: 29.88 ms/image at 33.5 fps.</desc>
