     font-family="'Times New Roman', Times, serif"
     font-size="17px"
     font-weight="bold"
     fill="#1a1a1a"
     id="text1">LeNet-5 End-to-End Latency Breakdown — 200 MNIST Images @ 64 MHz</text>
