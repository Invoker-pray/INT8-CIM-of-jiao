<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="492"
     viewBox="0 0 900 492"
     font-family="'Times New Roman', Times, serif">

  <!-- ============================================================
       ARROWHEAD MARKER
       ============================================================ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6"
            refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="900" height="492" fill="white"/>


  <!-- ============================================================
       SUBFIGURE (a) — LATENCY COMPARISON
       ============================================================ -->

  <!-- Subfigure title -->
  <text x="450" y="20" font-size="13" font-weight="bold"
        text-anchor="middle">(a) Latency Comparison</text>

  <!-- Lane label / block area vertical separator -->
  <line x1="150" y1="35" x2="150" y2="166"
        stroke="#BBBBBB" stroke-width="0.5"/>

  <!-- ---- LANE A LABEL ---- -->
  <text x="75" y="52" font-size="10" text-anchor="middle">Without Layer</text>
  <text x="75" y="64" font-size="10" text-anchor="middle">Fusion</text>

  <!-- ---- LANE A BLOCKS ---- -->

  <!-- Compute FC1 (orange) -->
  <rect x="155" y="38" width="220" height="38"
        fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
  <text x="265" y="61" font-size="11" text-anchor="middle">Compute FC1</text>

  <!-- S2MM: OBUF→DDR (blue) -->
  <rect x="375" y="38" width="130" height="38"
        fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
  <text x="440" y="53" font-size="9" text-anchor="middle">S2MM:</text>
  <text x="440" y="65" font-size="9" text-anchor="middle">OBUF&#x2192;DDR</text>

  <!-- MM2S: DDR→IBUF (blue) -->
  <rect x="505" y="38" width="130" height="38"
        fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
  <text x="570" y="53" font-size="9" text-anchor="middle">MM2S:</text>
  <text x="570" y="65" font-size="9" text-anchor="middle">DDR&#x2192;IBUF</text>

  <!-- Compute FC2 (orange) -->
  <rect x="635" y="38" width="215" height="38"
        fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
  <text x="742" y="61" font-size="11" text-anchor="middle">Compute FC2</text>

  <!-- ---- LANE A RED BRACKET ANNOTATION ---- -->
  <!-- bracket horizontal bar -->
  <line x1="375" y1="84" x2="635" y2="84"
        stroke="#C0392B" stroke-width="1.0"/>
  <!-- bracket left tick -->
  <line x1="375" y1="80" x2="375" y2="88"
        stroke="#C0392B" stroke-width="1.0"/>
  <!-- bracket right tick -->
  <line x1="635" y1="80" x2="635" y2="88"
        stroke="#C0392B" stroke-width="1.0"/>
  <!-- bracket annotation text -->
  <text x="505" y="97" font-size="9" fill="#C0392B" text-anchor="middle">Inter-layer DMA roundtrip: ~tens of ms</text>

  <!-- ---- SWIM LANE SEPARATOR ---- -->
  <line x1="30" y1="108" x2="856" y2="108"
        stroke="#BBBBBB" stroke-width="0.5"/>

  <!-- ---- LANE B LABEL ---- -->
  <text x="75" y="131" font-size="10" text-anchor="middle">With Layer</text>
  <text x="75" y="143" font-size="10" text-anchor="middle">Fusion</text>

  <!-- ---- LANE B BLOCKS ---- -->

  <!-- Compute FC1 (orange, same width as Lane A) -->
  <rect x="155" y="116" width="220" height="38"
        fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
  <text x="265" y="139" font-size="11" text-anchor="middle">Compute FC1</text>

  <!-- OBUF→IBUF hardware copy (green, very narrow) -->
  <rect x="375" y="116" width="15" height="38"
        fill="#B5D99C" stroke="#4A7A2E" stroke-width="0.75"/>

  <!-- Compute FC2 (orange) -->
  <rect x="390" y="116" width="215" height="38"
        fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
  <text x="497" y="139" font-size="11" text-anchor="middle">Compute FC2</text>

  <!-- ---- LANE B GREEN BRACKET ANNOTATION ---- -->
  <!-- bracket horizontal bar -->
  <line x1="375" y1="161" x2="390" y2="161"
        stroke="#4A7A2E" stroke-width="1.0"/>
  <!-- bracket left tick -->
  <line x1="375" y1="157" x2="375" y2="165"
        stroke="#4A7A2E" stroke-width="1.0"/>
  <!-- bracket right tick -->
  <line x1="390" y1="157" x2="390" y2="165"
        stroke="#4A7A2E" stroke-width="1.0"/>
  <!-- leader line to annotation text -->
  <line x1="383" y1="163" x2="420" y2="172"
        stroke="#4A7A2E" stroke-width="0.75"/>
  <!-- annotation text -->
  <text x="424" y="175" font-size="9" fill="#4A7A2E" text-anchor="start">OBUF&#x2192;IBUF hw copy &#xb7; Fusion latency &#x2248; 1.5 &#x3bc;s (&#x2248;10,000&#xd7; faster)</text>

  <!-- ---- VERTICAL DASHED ALIGNMENT LINE (x=375, end of FC1) ---- -->
  <line x1="375" y1="35" x2="375" y2="158"
        stroke="#AAAAAA" stroke-width="0.75" stroke-dasharray="4 3"/>

  <!-- ---- TIME AXIS ---- -->
  <line x1="155" y1="186" x2="851" y2="186"
        stroke="black" stroke-width="1.0" marker-end="url(#arr)"/>
  <text x="856" y="190" font-size="9" text-anchor="start">Time</text>


  <!-- ============================================================
       SUBFIGURE SEPARATOR
       ============================================================ -->
  <line x1="30" y1="200" x2="870" y2="200"
        stroke="#999999" stroke-width="0.5"/>


  <!-- ============================================================
       SUBFIGURE (b) — FUSION FSM
       ============================================================ -->

  <!-- Subfigure title -->
  <text x="450" y="220" font-size="13" font-weight="bold"
        text-anchor="middle">(b) Fusion FSM</text>

  <!-- ---- INITIAL STATE INDICATOR ARROW ---- -->
  <line x1="88" y1="360" x2="119" y2="360"
        stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ---- STATE CIRCLES ---- -->

  <!-- F_IDLE (start state, light green) -->
  <circle cx="153" cy="360" r="33"
          fill="#B5D99C" stroke="#4A7A2E" stroke-width="1.0"/>
  <text x="153" y="364" font-size="10" text-anchor="middle">F_IDLE</text>

  <!-- F_WAIT_MUX -->
  <circle cx="323" cy="360" r="33"
          fill="#B5D99C" stroke="#4A7A2E" stroke-width="1.0"/>
  <text x="323" y="355" font-size="9.5" text-anchor="middle">F_WAIT</text>
  <text x="323" y="368" font-size="9.5" text-anchor="middle">_MUX</text>

  <!-- F_PACK -->
  <circle cx="493" cy="360" r="33"
          fill="#B5D99C" stroke="#4A7A2E" stroke-width="1.0"/>
  <text x="493" y="364" font-size="10" text-anchor="middle">F_PACK</text>

  <!-- F_WRITE -->
  <circle cx="663" cy="360" r="33"
          fill="#B5D99C" stroke="#4A7A2E" stroke-width="1.0"/>
  <text x="663" y="364" font-size="10" text-anchor="middle">F_WRITE</text>

  <!-- ---- SELF-LOOP ON F_IDLE (fuse_start=0), dashed ---- -->
  <!-- path: starts at upper-right of circle, arcs above, ends at upper-left -->
  <path d="M 176,337 C 210,292 96,292 130,337"
        fill="none" stroke="black" stroke-width="1.0"
        stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="153" y="283" font-size="9" text-anchor="middle">fuse_start=0</text>

  <!-- ---- FORWARD TRANSITION ARROWS ---- -->

  <!-- F_IDLE → F_WAIT_MUX -->
  <line x1="186" y1="360" x2="290" y2="360"
        stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="238" y="349" font-size="9" text-anchor="middle">fuse_start=1</text>

  <!-- F_WAIT_MUX → F_PACK -->
  <line x1="356" y1="360" x2="460" y2="360"
        stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="408" y="349" font-size="8.5" text-anchor="middle">mux ready (2 cycles)</text>

  <!-- F_PACK → F_WRITE -->
  <line x1="526" y1="360" x2="630" y2="360"
        stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="578" y="349" font-size="9" text-anchor="middle">16 bytes packed</text>

  <!-- ---- BACK ARC: F_WRITE → F_PACK (more elements), dashed ---- -->
  <!-- starts at upper-left of F_WRITE, curves above, ends at upper-right of F_PACK -->
  <path d="M 640,337 C 640,297 516,297 516,337"
        fill="none" stroke="black" stroke-width="1.0"
        stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="578" y="288" font-size="9" text-anchor="middle">more elements</text>

  <!-- ---- RETURN ARC: F_WRITE → F_IDLE (all n_elements done) ---- -->
  <!-- starts at bottom of F_WRITE, curves below all states, ends at bottom of F_IDLE -->
  <path d="M 663,393 C 663,455 153,455 153,393"
        fill="none" stroke="black" stroke-width="1.0"
        marker-end="url(#arr)"/>
  <text x="408" y="462" font-size="9" text-anchor="middle">all n_elements done</text>

  <!-- ---- FUSION CYCLES EQUATION ---- -->
  <text x="450" y="481" font-size="11" font-style="italic"
        text-anchor="middle">Fusion cycles = n_elements + 1 + &#x2308;n_elements/16&#x2309; &#xd7; 2</text>

</svg>
