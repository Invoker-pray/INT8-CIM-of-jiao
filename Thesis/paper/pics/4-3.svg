<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" viewBox="0 0 690 550" role="img" version="1.1" xmlns="http://www.w3.org/2000/svg">
<title>FPGA Resource Utilization: ARM vs PicoRV32 Control Modes on PYNQ-Z2</title>
<desc>Grouped bar chart comparing LUT, FF, BRAM, and DSP48 utilization percentages between ARM Mode and PicoRV32 Mode on Zynq-7020 FPGA.</desc>
<!-- White background -->
<rect x="0" y="0" width="690" height="550" fill="white"/>
<!-- Title -->
<text x="345" y="28" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="14" font-weight="bold" fill="#111111">FPGA Resource Utilization: ARM vs. PicoRV32 Control (PYNQ-Z2 / Zynq-7020)</text>
<!-- Chart area: x=70..640, y=50..390 -->
<!-- Y axis label -->
<text transform="translate(14, 220) rotate(-90)" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#222222">Utilization (%)</text>
<!-- Horizontal grid lines (light) at 20, 40, 60, 80, 100 -->
<!-- y: 390 = 0%, scale: 340px for 100%, so 1%=3.4px -->
<line x1="70" y1="390" x2="640" y2="390" stroke="#CCCCCC" stroke-width="0.75"/>
<line x1="70" y1="322" x2="640" y2="322" stroke="#DDDDDD" stroke-width="0.5"/>
<line x1="70" y1="254" x2="640" y2="254" stroke="#DDDDDD" stroke-width="0.5"/>
<line x1="70" y1="186" x2="640" y2="186" stroke="#DDDDDD" stroke-width="0.5"/>
<line x1="70" y1="118" x2="640" y2="118" stroke="#DDDDDD" stroke-width="0.5"/>
<line x1="70" y1="50" x2="640" y2="50" stroke="#DDDDDD" stroke-width="0.5"/>
<!-- Y axis labels -->
<text x="62" y="394" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">0%</text>
<text x="62" y="326" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">20%</text>
<text x="62" y="258" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">40%</text>
<text x="62" y="190" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">60%</text>
<text x="62" y="122" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">80%</text>
<text x="62" y="54" text-anchor="end" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#333333">100%</text>
<!-- Y axis line -->
<line x1="70" y1="50" x2="70" y2="390" stroke="#444444" stroke-width="1"/>
<!-- X axis line -->
<line x1="70" y1="390" x2="640" y2="390" stroke="#444444" stroke-width="1"/>
<!-- 100% dashed red line -->
<line x1="70" y1="50" x2="640" y2="50" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="621" y="54" text-anchor="start" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9.5" font-style="italic" fill="#C0392B">FPGA capacity</text>
<!-- GROUP LAYOUT: 4 groups: LUT, FF, BRAM, DSP48 -->
<!-- Group width: (640-70)/4 = 142.5 -->
<!-- Group centers: 141.25, 283.75, 426.25, 568.75 -->
<!-- Bar width: 34px each, gap between pair: 6px -->
<!-- Bar A (ARM) left edge: center - 37 -->
<!-- Bar B (PicoRV32) left edge: center + 3 -->
<!-- Scale factor: 3.4px per 1% -->

<!-- ===== GROUP 1: LUT ===== -->
<!-- ARM: 15567/53200 = 29.26% → height = 29.26*3.4 = 99.48, y = 390-99 = 291 -->
<!-- PicoRV32: 15231/53200 = 28.63% → height = 28.63*3.4 = 97.34, y = 390-97 = 293 -->
<rect x="104" y="291" width="34" height="99" fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
<rect x="145" y="293" width="34" height="97" fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
<text x="121" y="286" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">15,567</text>
<text x="162" y="288" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">15,231</text>
<text x="121" y="345" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#1A3A5C">29.26%</text>
<text x="162" y="347" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#6B3A0A">28.63%</text>
<text x="153" y="407" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#111111">LUT</text>

<!-- ===== GROUP 2: FF ===== -->
<!-- ARM: 16790/106400 = 15.78% → height=15.78*3.4 = 53.65, y=390-54=336 -->
<!-- PicoRV32: 14654/106400 = 13.77% → height=13.77*3.4 = 46.82, y=390-47=343 -->
<rect x="246" y="336" width="34" height="54" fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
<rect x="287" y="343" width="34" height="47" fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
<text x="263" y="331" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">16,790</text>
<text x="304" y="338" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">14,654</text>
<text x="263" y="318" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#1A3A5C">15.78%</text>
<text x="304" y="325" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#6B3A0A">13.77%</text>
<text x="295" y="407" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#111111">FF</text>

<!-- ===== GROUP 3: BRAM ===== -->
<!-- ARM: 123.5/140 = 88.21% → height=88.21*3.4 = 299.91, y=390-300=90 -->
<!-- PicoRV32: 129.5/140 = 92.50% → height=92.50*3.4 = 314.50, y=390-315=75 -->
<rect x="389" y="90" width="34" height="300" fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
<rect x="430" y="75" width="34" height="315" fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
<text x="406" y="85" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">123.5 (of 140)</text>
<text x="447" y="70" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">129.5</text>
<text x="406" y="145" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#1A3A5C">88.21%</text>
<text x="447" y="140" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#6B3A0A">92.50%</text>
<text x="437" y="407" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#111111">BRAM</text>

<!-- ===== GROUP 4: DSP48 ===== -->
<!-- ARM: 134/220 = 60.91% → height=60.91*3.4 = 207.09, y=390-207=183 -->
<!-- PicoRV32: 134/220 = 60.91% → height=207, y=183 -->
<rect x="531" y="183" width="34" height="207" fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
<rect x="572" y="183" width="34" height="207" fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
<text x="548" y="178" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">134 (of 220)</text>
<text x="589" y="178" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#111111">134</text>
<text x="548" y="240" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#1A3A5C">60.91%</text>
<text x="589" y="240" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="9" fill="#6B3A0A">60.91%</text>
<text x="579" y="407" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#111111">DSP48</text>

<!-- ===== LEGEND ===== -->
<rect x="504" y="460" width="166" height="50" fill="white" stroke="#AAAAAA" stroke-width="0.75" rx="3"/>
<rect x="517" y="471" width="14" height="12" fill="#A8D5E2" stroke="#2E5C8A" stroke-width="0.75"/>
<text x="541" y="479" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#111111">ARM Mode</text>
<rect x="517" y="491" width="14" height="12" fill="#F5B461" stroke="#B86B1F" stroke-width="0.75"/>
<text x="541" y="500" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" fill="#111111">PicoRV32 Mode</text>

<!-- ===== ANNOTATION BELOW CHART ===== -->
<line x1="70" y1="418" x2="640" y2="418" stroke="#CCCCCC" stroke-width="0.5"/>
<text x="355" y="435" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="10" font-style="italic" fill="#555555">★ DSP48 at 60.91% (PAR_OB=2 with multiplier time-multiplexing) — no longer 100%</text>
<text x="355" y="452" text-anchor="middle" font-family="'Times New Roman', 'Computer Modern', Georgia, serif" font-size="11" fill="#444444">Resource Category</text>
</svg>
