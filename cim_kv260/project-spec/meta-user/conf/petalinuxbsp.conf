#User Configuration — KV260 SOM (xck26) has no VCU
MACHINE_HWCODECS = ""
IMAGE_FEATURES:remove = "hwcodecs"

# Work around GCC 14+/16 incompatibility with legacy C in Yocto native recipes
# -std=gnu17: force C17 mode — GCC 16 defaults to C23 which breaks gnulib's
# [[nodiscard]] placement, K&R-style definitions, and implicit-int in old recipes
BUILD_CFLAGS:append = " -std=gnu17 -Wno-error=incompatible-pointer-types -Wno-error=old-style-definition -Wno-error=implicit-int -Wno-error=int-conversion"
BUILD_CXXFLAGS:append = " -Wno-error=incompatible-pointer-types -Wno-error=old-style-definition -Wno-error=implicit-int -Wno-error=int-conversion"
CFLAGS:append:class-native = " -std=gnu17 -Wno-error=incompatible-pointer-types -Wno-error=old-style-definition -Wno-error=implicit-int -Wno-error=int-conversion"
CXXFLAGS:append:class-native = " -Wno-error=incompatible-pointer-types -Wno-error=old-style-definition -Wno-error=implicit-int -Wno-error=int-conversion"
TARGET_CFLAGS:append:class-native = " -std=gnu17 -Wno-error=incompatible-pointer-types -Wno-error=old-style-definition -Wno-error=implicit-int -Wno-error=int-conversion"

